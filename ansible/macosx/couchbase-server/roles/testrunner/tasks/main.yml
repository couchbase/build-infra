---
- name: Install python 3.9.2
  homebrew:
    name: https://raw.githubusercontent.com/Homebrew/homebrew-core/0a0b8fedc36019ea2fb15605e605a56a772f2f79/Formula/python%403.9.rb
  tags: python3
  when: NODE_CLASS == "cv"

- name: Install python3 modules for testrunner
  pip:
    name:
      - sgmllib3k==1.0.0
      - paramiko==2.7.1
      - httplib2==0.17.1
      - pyyaml==5.3.1
      - beautifulsoup4==4.8.2
      - Geohash==1.0
      - python-geohash==0.8.5
      - deepdiff==4.3.2
      - pyes==0.99.6
      - pytz==2019.3
      - requests==2.23.0
      - jsonpickle==1.3
      - docker==4.2.0
      - decorator==4.4.2
    executable: "{{ homebrew_dir }}/bin/pip3"
  when: NODE_CLASS == "cv"
