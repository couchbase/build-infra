---
- hosts: all

  vars:
    merge_modules:
      - Microsoft_VC100_CRT_x64.msm
      - Microsoft_VC120_CRT_x64.msm
      - Microsoft_VC140_CRT_x64.msm
      - Microsoft_VC142_CRT_x64.msm
      - Microsoft_VC143_CRT_x64.msm
      - Microsoft_VC143_OpenMP_x64.msm

  tasks:
    - name: Install patch_via_gerrit
      include_role:
        name: ../../../common/roles/patch_via_gerrit

    - name: Make temp dir
      win_file:
        path: C:\Temp
        state: directory

    # Needed for WiX Toolset
    - name: "Enable .NET Framework 3.5"
      win_feature:
        name: "NET-Framework-Core"
        state: present

    - name: "Install tools"
      win_chocolatey:
        name: "{{ item }}"
        allow_empty_checksums: "yes"
      with_items:
        - 7zip.commandline
        - cmake
        - curl
        - firefox
        - git
        - insted
        - jq
        - MinGW
        - nasm
        - ninja
        - pandoc
        - strawberryperl
        - vcredist140
        - vscode
        - wixtoolset

    # Note: vscode associates itself with .py files, so python is installed
    # after to ensure scripts still actually start when called directly
    - name: "Install uv"
      win_shell: |
        powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
      args:
        creates: C:\Users\Administrator\.local\bin\uv.exe
      tags:
      - python
      - uv

    - name: "Add uv to PATH (machine)"
      win_path:
        elements: C:\Users\Administrator\.local\bin
        scope: machine
        state: present
      tags:
      - python
      - uv

    - name: "Check if Python {{ python_version }} is installed (uv)"
      win_shell: |
        C:\Users\Administrator\.local\bin\uv.exe python find {{ python_version }}
      register: python310_find
      ignore_errors: true
      changed_when: false
      tags:
      - python

    - name: "Install Python {{ python_version }} using uv"
      win_shell: C:\Users\Administrator\.local\bin\uv.exe python install {{ python_version }}
      when: python310_find.rc != 0
      tags:
      - python

    - name: "Determine Python {{ python_version }} directory (uv)"
      win_shell: |
        $env:PATH = "C:\Users\Administrator\.local\bin;$env:PATH"
        $py = uv python find {{ python_version }}
        Split-Path -Parent $py
      register: python310_dir
      changed_when: false
      tags:
      - python

    - name: "Add uv-managed Python {{ python_version }} to PATH (machine)"
      win_path:
        elements: "{{ python310_dir.stdout | trim }}"
        scope: machine
        state: present
      tags:
      - python

    - name: "Ensure python3.exe alongside python.exe"
      win_shell: |
        $dir = "{{ python310_dir.stdout | trim }}"
        if ($dir -and (Test-Path "$dir\\python.exe")) {
          if (-not (Test-Path "$dir\\python3.exe")) { Copy-Item "$dir\\python.exe" "$dir\\python3.exe" }
        }
      changed_when: false
      tags:
      - python

    - name: "Install Ruby"
      win_chocolatey:
        name: ruby
        state: present
        version: 2.6.10.1
        force: yes
      tags:
      - ruby

    - name: Set up Java for Jenkins
      block:
        - name: Install JDK
          win_chocolatey:
            name: openjdk
            state: latest

        - name: Find JDK install dirs
          win_find:
            paths: 'C:\Program Files\OpenJDK'
            recurse: no
            file_type: directory
            patterns: 'jdk-*'
          register: java_dirs

        - name: Determine latest JDK
          set_fact:
            latest_java_dir: "{{ (java_dirs.files | map(attribute='path') | list | sort | last) }}"

        - name: Set JAVA_HOME
          win_environment:
            state: present
            name: JAVA_HOME
            value: '{{ latest_java_dir }}'
            level: machine

        - name: Retrieve current JDK path
          win_shell: '[System.Environment]::GetEnvironmentVariable("PATH", "Machine")'
          register: current_path

        - name: Ensure JDK bindir is on PATH
          win_environment:
            state: present
            name: PATH
            value: "{{ latest_java_dir }}\\bin;{{ current_path.stdout }}"
            level: machine
          when: latest_java_dir + '\\bin' not in current_path.stdout
      tags:
        - java

    - name: Create download area for Ansible
      win_file:
        path: "{{ targetvolume | default('c') }}:\\ansible_files"
        state: directory
      tags:
        - setup

    - name: Install VS CRT Merge Modules
      block:
        - name: Check if latestbuilds is reachable from target
          win_uri:
            url: http://latestbuilds.service.couchbase.com
            method: HEAD
            timeout: 5
          register: latestbuilds_check
          failed_when: false
          changed_when: false

        - name: Set latestbuilds reachability fact
          set_fact:
            latestbuilds_reachable: "{{ latestbuilds_check.status_code is defined and latestbuilds_check.status_code == 200 }}"

        - name: Create required "[vol]:\\Program Files (x86)\\Common Files\\Merge Modules" directory
          win_file:
            path: "{{ targetvolume | default('c') }}:\\Program Files (x86)\\Common Files\\Merge Modules"
            state: directory

        - name: Download older VS CRT Merge Modules (latestbuilds reachable from target, direct download)
          win_get_url:
            url: "http://latestbuilds.service.couchbase.com/buildteam/downloads/winbits/{{ item }}"
            dest: "{{ targetvolume | default('c') }}:\\Program Files (x86)\\Common Files\\Merge Modules\\{{ item }}"
            force: no
            timeout: 600
          with_items: "{{ merge_modules }}"
          when: latestbuilds_reachable

        - name: Create local temp directory for winbits
          delegate_to: localhost
          become: no
          file:
            path: "/tmp/winbits"
            state: directory
            mode: '0755'
          run_once: true
          when: not latestbuilds_reachable

        - name: Download merge modules to local machine (latestbuilds not reachable from target)
          delegate_to: localhost
          become: no
          get_url:
            url: "http://latestbuilds.service.couchbase.com/buildteam/downloads/winbits/{{ item }}"
            dest: "/tmp/winbits/{{ item }}"
            mode: '0644'
            timeout: 600
          with_items: "{{ merge_modules }}"
          run_once: true
          when: not latestbuilds_reachable

        - name: Copy merge modules from local machine to target
          win_copy:
            src: "/tmp/winbits/{{ item }}"
            dest: "{{ targetvolume | default('c') }}:\\Program Files (x86)\\Common Files\\Merge Modules\\{{ item }}"
          with_items: "{{ merge_modules }}"
          when: not latestbuilds_reachable
      tags:
        - mergemodules

    - name: Create [targetvolume] bin directory
      win_file:
        path: "{{ targetvolume | default('c') }}:\\bin"
        state: directory

    - name: Download repo
      win_uri:
        url: "https://gerrit.googlesource.com/git-repo/+/refs/tags/v2.32/repo?format=TEXT"
        dest: "{{ targetvolume | default('c') }}:\\Temp\\repo.encoded"
        method: GET
      register: repo_download_result
      tags:
        - repo

    - name: Check repo download
      assert:
        that:
        - repo_download_result.status_code == 200
        fail_msg: "Error: Repo could not be downloaded"
      tags:
        - repo

    - name: Decode repo
      win_shell: |
        $content = Get-Content -Path C:\Temp\repo.encoded
        $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($content))
        Set-Content -Path C:\bin\repo -Value $decoded
      tags:
        - repo

    - name: Check decode result
      win_shell: Test-Path C:\Temp\repo
      register: repo_downloaded

    - name: Remove repo temp file
      win_file:
        path: C:\Temp\repo.encoded
        state: absent
      tags:
        - repo

    - name: "Install repo wrapper"
      win_copy:
        src: repo.exe
        dest: "{{ targetvolume | default('c') }}:\\bin\\"
      tags:
        - repo

    # Due to a silly bug in ESRlabs' Repo port, git's core.pager setting MUST
    # be set, and moreover it MUST be set to a command that exists as a .exe.
    # more is actually "more.com", and while setting core.pager to "more.com"
    # works well from a command prompt, it throws a Python error when invoked
    # via Jenkins "Gerrit Repo" source-control plugin. So, we use MSYS's
    # "cat.exe", which requires that we copy both that file and a few MSYS
    # DLLs onto the PATH.
    - name: "Copy MSYS tools to [vol]:\\bin for repo"
      win_copy:
        src: "c:\\Program Files\\Git\\usr\\bin\\{{ item }}"
        dest: "{{ targetvolume | default('c') }}:\\bin\\"
        remote_src: yes
      loop:
        - cat.exe
        - msys-2.0.dll
        - msys-iconv-2.dll
        - msys-intl-8.dll
      tags:
        - repo

    - name: Find WiX Toolset directory
      win_find:
        paths: C:\PROGRA~2
        patterns: 'WiX*'
        file_type: directory
      register: wix_dirs
      tags:
        - path

    - name: Add tools to PATH
      win_path:
        elements:
          - "{{ targetvolume | default('c') }}:\\bin"
          - C:\PROGRA~1\CMake\bin
          - C:\PROGRA~1\git\cmd
          - C:\PROGRA~1\NASM
          - C:\PROGRA~1\OpenSSH-Win64
          - "{{ (wix_dirs.files | sort(attribute='path') | last).path }}\\bin"
        state: present
        scope: machine
      tags:
        - path

    - name: "Enable Remote Desktop"
      win_regedit:
        key: 'HKLM:\System\CurrentControlSet\Control\Terminal Server'
        name: fDenyTSConnections
        data: "0"
        type: dword
        state: present

    - name: "Open Remote Desktop in firewall"
      win_firewall_rule:
        name: "remote desktop"
        enable: yes
        state: present
        localport: "3389"
        action: allow
        direction: in
        protocol: TCP

    - name: Restore basic Windows antivirus
      win_shell: Remove-MpPreference -ExclusionPath "C:"

    - name: Exclude Jenkins from Windows antivirus
      win_shell: Add-MpPreference -ExclusionPath "{{ targetvolume | default('c') }}:\Jenkins" -ExclusionExtension "exe"

    - name: install vs2022
      include_role:
        name: "../../roles/vs2022"
        apply:
          tags:
            - visualstudio
      vars:
        PRODUCT: "{{ NODE_PRODUCT }}"
      tags:
        - visualstudio

    # bcrypt is installed in this step, and needs visual studio to be present
    - name: "Install python3 modules for testrunner"
      win_shell: |
        $env:PATH = "C:\Users\Administrator\.local\bin;$env:PATH"
        uv pip install --python {{ python_version }} sgmllib3k==1.0.0 paramiko==2.7.1 httplib2==0.17.1 pyyaml==5.3.1 beautifulsoup4==4.8.2 Geohash==1.0 python-geohash==0.8.5 deepdiff==4.3.2 pyes==0.99.6 pytz==2019.3 requests==2.23.0 jsonpickle==1.3 docker==4.2.0 decorator==4.4.2
      environment:
        LIB: C:\Program Files\OpenSSL-Win64\lib
        INCLUDE: C:\Program Files\OpenSSL-Win64\include
      tags:
        - never
        - testrunner

    - name: Install AV tooling
      win_chocolatey:
        name: "{{ item }}"
        allow_empty_checksums: "yes"
      with_items:
        - clamwin
        - 7zip.commandline
        - jdk8
      tags:
        - never
        - av

    - name: Configure profile synchronization
      include_role:
        name: "../../roles/profile"
        apply:
          tags:
            - profile
      tags:
        - profile

    - name: Install cygwin
      include_role:
        name: ../../roles/cygwin

    - name: Install asciidoctor
      win_shell: gem install asciidoctor
      args:
        executable: cmd

    - name: Check if OpenSSH is already installed
      win_stat:
        path: C:\Windows\System32\OpenSSH\sshd.exe
      register: builtin_openssh
      tags:
        - openssh

    - name: Install OpenSSH via Chocolatey
      win_chocolatey:
        name: openssh
        params: /SSHServerFeature
        state: latest
      when: not builtin_openssh.stat.exists
      tags:
        - openssh

    - name: Ensure OpenSSH service is configured (built-in)
      win_service:
        name: sshd
        start_mode: auto
        state: started
      when: builtin_openssh.stat.exists
      tags:
        - openssh

    - name: Ensure OpenSSH executables are pathed (machine) - Chocolatey install
      win_path:
        name: PATH
        elements: C:\Program Files\OpenSSH-Win64
        scope: machine
        state: present
      when: not builtin_openssh.stat.exists
      tags:
        - openssh

    - name: Ensure OpenSSH executables are pathed (user) - Chocolatey install
      win_path:
        name: PATH
        elements: C:\Program Files\OpenSSH-Win64
        scope: user
        state: present
      when: not builtin_openssh.stat.exists
      tags:
        - openssh

    - name: Ensure OpenSSH executables are pathed (machine) - Built-in
      win_path:
        name: PATH
        elements: C:\Windows\System32\OpenSSH
        scope: machine
        state: present
      when: builtin_openssh.stat.exists
      tags:
        - openssh

    - name: Ensure OpenSSH executables are pathed (user) - Built-in
      win_path:
        name: PATH
        elements: C:\Windows\System32\OpenSSH
        scope: user
        state: present
      when: builtin_openssh.stat.exists
      tags:
        - openssh

    - name: Create .ssh directory if it doesn't exist
      win_file:
        path: C:\Users\Administrator\.ssh
        state: directory
      tags:
        - openssh

    - name: Configure SSH to allow legacy key exchange algorithms
      win_copy:
        dest: C:\Users\Administrator\.ssh\config
        content: |
          Host *
              PubkeyAcceptedAlgorithms +ssh-rsa
              HostkeyAlgorithms +ssh-rsa
      tags:
        - openssh

    - name: Enable long path support in Windows
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem
        name: LongPathsEnabled
        data: 1
        type: dword
        state: present
      tags:
        - longpaths

    - name: Configure Git to use long paths
      win_shell: git config --system core.longpaths true
      args:
        executable: cmd
      tags:
        - longpaths

    - name: Configure ephemeral ports
      win_shell: netsh int {{ item[0] }} set dynamicport {{ item[1] }} start=1025 num=64511
      args:
        executable: cmd
      with_nested:
      - [ 'ipv4', 'ipv6' ]
      - [ 'tcp', 'udp' ]
